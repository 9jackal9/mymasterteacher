<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Master-Teacher</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { extend: {} }
        }
    </script>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* 모바일 꽉 찬 화면 유지용 CSS */
        html, body { height: 100%; width: 100%; margin: 0; padding: 0; overflow: hidden; background-color: #b2c7d9; font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif; }
        #root { height: 100%; }
        /* 스크롤바 숨기기 */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background-color: rgba(0,0,0,0.2); border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const MASTER_TEACHER_PERSONA = `당신은 대한민국 최고의 '수석교사(Master Teacher)'입니다. 전공은 국어교육입니다.
20년 이상의 풍부한 현장 교육 경험을 바탕으로, 동료 교사 및 후배 교사들의 든든한 멘토 역할을 수행합니다.
특히 '2022 개정 교육과정'과 'IB 교육과정'의 최고 전문가로서 학생 주도성, 개념 기반 탐구 학습, 논서술형 평가 루브릭 등에 대해 깊이 있고 전문적인 조언을 제공합니다.

[답변 가이드라인]
- 톤앤매너: 진지하고 깊이 있는 어조로 교육의 본질을 꿰뚫는 전문적인 피드백을 제공합니다.
- 추상적인 이론보다는 실제 대한민국 학교 현장(초/중/고)에서 바로 써먹을 수 있는 구체적인 팁, 대화 스크립트, 예시 문안을 반드시 포함하세요.
- 서류 양식이나 공문 작성을 요청받으면, 바로 복사해서 쓸 수 있는 수준의 초안을 제공하고 피드백해주세요.
- ★맞춤형 파일 제공 프로세스★: 
  1) 사용자가 "파일로 만들어줘", "양식 만들어줘", "수정본 줘"라고 요청하면, 무작정 결과물을 주지 말고 가장 먼저 "어떤 파일 형식(hwp, docx, pdf, txt, xlsx 등)으로 만들어 드릴까요?"라고 정중하게 질문하세요.
  2) 사용자가 특정 확정자를 지정하면, 사용자가 업로드했던 원본 파일의 디자인과 양식(표, 항목 배치, 개요 번호, 들여쓰기, 단락 구조 등)을 훼손하지 않고 최대한 똑같이 유지하여 내용을 작성하세요.
  3) 최종 결과물 내용은 반드시 <download filename="문서명.요청한확장자">여기에 원본 양식을 살린 전체 내용을 넣으세요.</download> 태그로 감싸서 출력하세요.
- ★중요★: 마지막 한 문단은 교직 생활의 짠한 애환과 공감대가 녹아있는 해학과 위트, 유머러스한 내용으로 마무리하여 선생님께 웃음과 위로를 주세요.`;

        function App() {
            // ★ 아래 따옴표 안의 글자를 원하시는 비밀번호로 변경하세요!
            const SHARED_PASSWORD = 'master2026'; 

            const [isAuthenticated, setIsAuthenticated] = useState(() => localStorage.getItem('master_teacher_auth') === 'true');
            const [passwordInput, setPasswordInput] = useState('');
            
            const [apiKey, setApiKey] = useState(() => localStorage.getItem('gemini_api_key') || '');
            const [showSettings, setShowSettings] = useState(false);
            const [toastMsg, setToastMsg] = useState('');

            const [messages, setMessages] = useState([]);
            const [inputText, setInputText] = useState("");
            const [isLoading, setIsLoading] = useState(false);
            
            const [attachedFiles, setAttachedFiles] = useState([]);
            const [isDragging, setIsDragging] = useState(false);
            
            const messagesEndRef = useRef(null);
            const fileInputRef = useRef(null);

            const showToast = (msg) => {
                setToastMsg(msg);
                setTimeout(() => setToastMsg(''), 3000);
            };

            useEffect(() => {
                messagesEndRef.current?.scrollIntoView({ behavior: "smooth" });
            }, [messages, isLoading]);

            const handleLogin = (e) => {
                e.preventDefault();
                if (passwordInput === SHARED_PASSWORD) {
                    setIsAuthenticated(true);
                    localStorage.setItem('master_teacher_auth', 'true');
                    showToast("환영합니다!");
                } else {
                    showToast("비밀번호가 일치하지 않습니다.");
                    setPasswordInput('');
                }
            };

            const onDragOver = (e) => {
                e.preventDefault();
                e.stopPropagation();
                setIsDragging(true);
            };

            const onDragLeave = (e) => {
                e.preventDefault();
                e.stopPropagation();
                // 화면 밖으로 마우스가 나갔을 때만 오버레이 끄기
                if (e.relatedTarget === null || e.target === e.currentTarget) {
                    setIsDragging(false);
                }
            };

            const onDrop = (e) => {
                e.preventDefault();
                e.stopPropagation();
                setIsDragging(false);
                if (e.dataTransfer.files && e.dataTransfer.files.length > 0) {
                    handleFiles(e.dataTransfer.files);
                }
            };

            const processFile = (file) => {
                return new Promise((resolve) => {
                    const ext = file.name.split('.').pop().toLowerCase();
                    const mimeType = file.type;
                    const isImage = mimeType.startsWith('image/');
                    const isPDF = mimeType === 'application/pdf' || ext === 'pdf';
                    const officeExts = ['hwp', 'hwpx', 'doc', 'docx', 'xls', 'xlsx', 'ppt', 'pptx'];

                    const reader = new FileReader();

                    if (isImage || isPDF) {
                        reader.onload = (event) => {
                            const base64Data = event.target.result.split(',')[1];
                            resolve({
                                id: Date.now() + Math.random().toString(36).substr(2, 9),
                                name: file.name,
                                isImage,
                                isPDF,
                                mimeType: mimeType || (isPDF ? 'application/pdf' : 'image/jpeg'),
                                previewUrl: isImage ? event.target.result : null,
                                base64Data,
                                textContent: null,
                                warning: officeExts.includes(ext)
                            });
                        };
                        reader.readAsDataURL(file);
                    } else {
                        reader.onload = (event) => {
                            let textResult = event.target.result;
                            if (textResult.length > 50000) {
                                textResult = textResult.substring(0, 50000) + "\n...(용량 제한으로 이하 생략됨)";
                            }
                            resolve({
                                id: Date.now() + Math.random().toString(36).substr(2, 9),
                                name: file.name,
                                isImage: false,
                                isPDF: false,
                                mimeType: null,
                                previewUrl: null,
                                base64Data: null,
                                textContent: textResult,
                                warning: officeExts.includes(ext)
                            });
                        };
                        reader.readAsText(file);
                    }
                });
            };

            const handleFiles = async (files) => {
                const fileArray = Array.from(files);
                
                // 총 용량 계산 (15MB 제한)
                const totalSize = fileArray.reduce((acc, file) => acc + file.size, 0);
                if (totalSize > 15 * 1024 * 1024) {
                    showToast("한 번에 업로드하는 총 파일 크기는 15MB 이하로 맞춰주세요.");
                    return;
                }

                // 모든 파일을 비동기로 읽기
                const newFilesData = await Promise.all(fileArray.map(processFile));
                
                // 문서 파일 경고 (한 번만 띄우기)
                if (newFilesData.some(f => f.warning)) {
                    showToast("⚠️ 문서 파일은 텍스트가 일부 깨질 수 있습니다 (PDF 권장)");
                }

                setAttachedFiles(prev => [...prev, ...newFilesData]);
                
                // 동일한 파일 재업로드 버그 방지를 위해 input 초기화
                if (fileInputRef.current) fileInputRef.current.value = '';
            };

            const handleFileUpload = (e) => {
                if (e.target.files && e.target.files.length > 0) {
                    handleFiles(e.target.files);
                }
            };

            const removeFile = (idToRemove) => {
                setAttachedFiles(prev => prev.filter(f => f.id !== idToRemove));
            };

            const handleSendMessage = async () => {
                if (!inputText.trim() && attachedFiles.length === 0) return;

                if (!apiKey) {
                    showToast("설정(⚙️)에서 Gemini API 키를 먼저 입력해주세요.");
                    setShowSettings(true);
                    return;
                }

                const currentText = inputText;
                const filesToSend = [...attachedFiles];

                setInputText("");
                setAttachedFiles([]);
                
                // 사용자가 보낸 내용을 화면에 표시하기 위한 텍스트 조립
                let displayMsg = currentText;
                if (filesToSend.length > 0) {
                    const fileNames = filesToSend.map(f => f.name).join(', ');
                    displayMsg = `[📎 첨부파일: ${fileNames}]\n${currentText}`;
                }
                
                // 사진 파일들의 미리보기 URL만 추출
                const previewImages = filesToSend.filter(f => f.isImage).map(f => f.previewUrl);
                
                const newUserMsg = { 
                    role: 'user', 
                    text: displayMsg, 
                    images: previewImages.length > 0 ? previewImages : null 
                };
                
                setMessages(prev => [...prev, newUserMsg]);
                setIsLoading(true);

                try {
                    let chatHistory = messages.map(msg => ({
                        role: msg.role === 'user' ? 'user' : 'model',
                        parts: [{ text: msg.text || "" }]
                    }));

                    const currentParts = [];
                    let textContext = "";

                    // 파일 데이터를 Gemini Parts 배열에 맞게 구성
                    filesToSend.forEach(fileObj => {
                        if (fileObj.base64Data) {
                            currentParts.push({
                                inlineData: { data: fileObj.base64Data, mimeType: fileObj.mimeType }
                            });
                        } else if (fileObj.textContent) {
                            textContext += `[문서 '${fileObj.name}' 내용]\n${fileObj.textContent}\n\n`;
                        }
                    });

                    // 최종 프롬프트 합체
                    const finalPrompt = textContext ? `${textContext}[사용자 질문]\n${currentText}` : currentText;
                    if (finalPrompt) {
                        currentParts.push({ text: finalPrompt });
                    }

                    chatHistory.push({ role: 'user', parts: currentParts });

                    const payload = {
                        contents: chatHistory,
                        systemInstruction: { parts: [{ text: MASTER_TEACHER_PERSONA }] }
                    };

                    const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`;

                    const response = await fetch(apiUrl, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    
                    const result = await response.json();

                    if (result.candidates && result.candidates.length > 0) {
                        const aiText = result.candidates[0].content.parts[0].text;
                        setMessages(prev => [...prev, { role: 'model', text: aiText }]);
                    } else {
                        setMessages(prev => [...prev, { role: 'model', text: "시스템 오류: API 키가 유효한지 확인해주세요." }]);
                    }

                } catch (error) {
                    console.error("AI Error:", error);
                    showToast("네트워크 오류가 발생했습니다. 잠시 후 다시 시도해주세요.");
                } finally {
                    setIsLoading(false);
                }
            };

            const handleDownload = (filename, content) => {
                // 다운로드할 텍스트 데이터를 Blob 객체로 변환하여 다운로드 트리거
                const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = filename;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            };

            const renderMessageText = (text) => {
                if (!text) return null;
                // <download filename="파일명">내용</download> 태그를 찾는 정규식
                const regex = /<download\s+filename="([^"]+)">([\s\S]*?)<\/download>/g;
                const parts = [];
                let lastIndex = 0;
                let match;

                while ((match = regex.exec(text)) !== null) {
                    // 다운로드 태그 이전의 일반 텍스트 추가
                    if (match.index > lastIndex) {
                        parts.push({ type: 'text', content: text.slice(lastIndex, match.index) });
                    }
                    // 다운로드 태그 내부의 파일명과 내용 추가
                    parts.push({ type: 'file', filename: match[1], content: match[2].trim() });
                    lastIndex = regex.lastIndex;
                }
                
                // 남은 일반 텍스트 추가
                if (lastIndex < text.length) {
                    parts.push({ type: 'text', content: text.slice(lastIndex) });
                }

                return parts.map((part, index) => {
                    if (part.type === 'text') {
                        return <span key={index}>{part.content}</span>;
                    }
                    if (part.type === 'file') {
                        return (
                            <div key={index} className="my-3 p-3 bg-blue-50 border border-blue-200 rounded-xl flex flex-col sm:flex-row items-start sm:items-center justify-between gap-3 overflow-hidden shadow-sm">
                                <div className="flex items-center space-x-2 truncate w-full">
                                    <div className="w-8 h-8 bg-blue-500 text-white flex items-center justify-center rounded-lg flex-shrink-0 text-sm">💾</div>
                                    <div className="flex flex-col truncate">
                                        <span className="font-bold text-gray-800 text-sm truncate">{part.filename}</span>
                                        <span className="text-[10px] text-gray-500">클릭하여 파일 저장</span>
                                    </div>
                                </div>
                                <button 
                                    onClick={() => handleDownload(part.filename, part.content)}
                                    className="w-full sm:w-auto px-4 py-2 bg-blue-500 hover:bg-blue-600 active:bg-blue-700 text-white text-xs font-bold rounded-lg transition-colors flex-shrink-0"
                                >
                                    다운로드
                                </button>
                            </div>
                        );
                    }
                    return null;
                });
            };

            if (!isAuthenticated) {
                return (
                    <div className="flex h-full w-full items-center justify-center bg-gray-50 p-4 overflow-y-auto">
                        <div className="bg-white p-6 sm:p-8 rounded-2xl shadow-xl max-w-sm w-full border border-gray-100 my-auto text-center">
                            <div className="w-16 h-16 bg-[#fee500] rounded-full flex items-center justify-center mx-auto mb-4 shadow-sm text-3xl">🔒</div>
                            <h2 className="text-2xl font-bold text-gray-800 mb-2">프라이빗 AI 라운지</h2>
                            <p className="text-gray-500 text-sm mb-6">수석교사 AI에 접속하려면<br/>공유받은 비밀번호를 입력해주세요.</p>
                            
                            <form onSubmit={handleLogin} className="space-y-4">
                                <input 
                                    type="password" 
                                    placeholder="비밀번호 입력" 
                                    value={passwordInput} 
                                    onChange={e => setPasswordInput(e.target.value)} 
                                    className="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-[#fee500] outline-none text-center tracking-widest" 
                                    required 
                                />
                                <button type="submit" className="w-full bg-[#fee500] hover:bg-[#f4db00] text-yellow-900 font-bold py-3.5 rounded-xl shadow-sm">
                                    입장하기
                                </button>
                            </form>
                        </div>
                    </div>
                );
            }

            return (
                <div 
                    className="flex flex-col h-full w-full bg-[#b2c7d9] font-sans relative overflow-hidden"
                    onDragOver={onDragOver}
                    onDragLeave={onDragLeave}
                    onDrop={onDrop}
                >
                    {/* 드래그 앤 드롭 오버레이 UI */}
                    {isDragging && (
                        <div className="absolute inset-0 z-[100] bg-black/60 flex items-center justify-center backdrop-blur-sm pointer-events-none">
                            <div className="bg-white/95 px-8 py-10 rounded-3xl shadow-2xl text-center flex flex-col items-center transform scale-105 transition-transform">
                                <div className="text-6xl mb-4 animate-bounce">📥</div>
                                <h2 className="text-2xl font-bold text-gray-800">파일을 여기에 놓아주세요</h2>
                                <p className="text-gray-600 mt-2 text-sm">여러 개의 사진, PDF, 문서를 한 번에 첨부할 수 있습니다.</p>
                            </div>
                        </div>
                    )}

                    {/* 토스트 메시지 */}
                    {toastMsg && (
                        <div className="absolute top-4 left-1/2 -translate-x-1/2 z-[60] bg-gray-800/95 text-white px-4 py-2.5 rounded-full shadow-lg flex items-center space-x-2 text-sm w-max max-w-[90vw]">
                            <span>⚠️ {toastMsg}</span>
                        </div>
                    )}

                    {/* 설정 모달 */}
                    {showSettings && (
                        <div className="absolute inset-0 z-50 bg-black/60 flex items-center justify-center p-4">
                            <div className="bg-white rounded-2xl shadow-2xl w-full max-w-sm flex flex-col overflow-hidden">
                                <div className="px-5 py-4 border-b flex justify-between items-center bg-gray-50">
                                    <h3 className="text-lg font-bold text-gray-800">⚙️ AI 환경 설정</h3>
                                    <button onClick={() => setShowSettings(false)} className="p-2 text-gray-400 hover:text-gray-600">❌</button>
                                </div>
                                <div className="p-5 space-y-4">
                                    <div>
                                        <label className="block text-sm font-bold text-gray-700 mb-2">Gemini API 키 입력</label>
                                        <input type="password" value={apiKey} onChange={(e) => { setApiKey(e.target.value); localStorage.setItem('gemini_api_key', e.target.value); }} className="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none text-sm" placeholder="API 키를 붙여넣으세요" />
                                    </div>
                                    <button onClick={() => setShowSettings(false)} className="w-full py-3 bg-gray-800 text-white font-bold rounded-xl hover:bg-gray-900 mt-2">저장하고 닫기</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* 상단 헤더 */}
                    <header className="bg-[#b2c7d9] px-4 py-3 sm:py-4 flex items-center justify-between border-b border-black/5 z-10 shadow-sm flex-shrink-0">
                        <div className="flex items-center space-x-2 sm:space-x-3">
                            <div className="w-10 h-10 bg-white rounded-2xl flex items-center justify-center shadow-sm text-2xl">👨‍🏫</div>
                            <div>
                                <h1 className="text-gray-800 font-bold text-base sm:text-lg leading-tight">My Master-Teacher</h1>
                                <p className="text-black/50 text-xs">2022 개정, IB 교육과정 수석교사</p>
                            </div>
                        </div>
                        <div className="flex items-center space-x-2">
                            <button onClick={() => setShowSettings(true)} className="p-2 bg-white/40 rounded-full shadow-sm relative">
                                <span>⚙️</span>
                                {!apiKey && <span className="absolute top-0 right-0 w-2.5 h-2.5 bg-red-500 rounded-full border-2 border-[#b2c7d9]"></span>}
                            </button>
                        </div>
                    </header>

                    {/* 메인 채팅 영역 */}
                    <main className="flex-1 overflow-y-auto p-4 space-y-4">
                        {messages.length === 0 && (
                            <div className="text-center my-8 text-black/50 text-sm bg-black/5 mx-auto py-2 px-4 rounded-full w-max shadow-sm">
                                수석교사님과 대화를 시작해보세요. (설정에서 API키 필수)
                            </div>
                        )}
                        {messages.map((msg, idx) => (
                            <div key={idx} className={`flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'} mb-4`}>
                                {msg.role !== 'user' && (
                                    <div className="w-9 h-9 rounded-xl bg-white flex-shrink-0 flex items-center justify-center mr-2 shadow-sm text-xl">👨‍🏫</div>
                                )}
                                <div className={`max-w-[85%] sm:max-w-[75%] flex flex-col ${msg.role === 'user' ? 'items-end' : 'items-start'}`}>
                                    {/* 여러 개의 이미지 말풍선 표시 */}
                                    {msg.images && msg.images.length > 0 && (
                                        <div className="mb-2 flex flex-wrap gap-2 justify-end">
                                            {msg.images.map((imgUrl, i) => (
                                                <div key={i} className="rounded-2xl overflow-hidden border-2 border-black/5 shadow-sm max-w-[150px]">
                                                    <img src={imgUrl} alt="uploaded" className="w-full h-auto object-cover" />
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                    {/* 기존 단일 이미지 호환용 (혹시 모를 에러 방지) */}
                                    {msg.image && !msg.images && (
                                        <div className="mb-1 rounded-2xl overflow-hidden border-2 border-black/5 shadow-sm max-w-[200px]">
                                            <img src={msg.image} alt="uploaded" className="w-full h-auto object-cover" />
                                        </div>
                                    )}
                                    {msg.text && (
                                        <div className={`px-4 py-2.5 rounded-2xl shadow-sm text-[15px] whitespace-pre-wrap leading-relaxed ${msg.role === 'user' ? 'bg-[#fee500] text-gray-900 rounded-tr-sm' : 'bg-white text-gray-800 rounded-tl-sm'}`}>
                                            {renderMessageText(msg.text)}
                                        </div>
                                    )}
                                </div>
                            </div>
                        ))}
                        {isLoading && (
                            <div className="flex justify-start mb-4">
                                <div className="w-9 h-9 rounded-xl bg-white flex-shrink-0 flex items-center justify-center mr-2 shadow-sm text-xl">👨‍🏫</div>
                                <div className="bg-white px-4 py-3 rounded-2xl rounded-tl-sm shadow-sm flex items-center space-x-2">
                                    <div className="w-2 h-2 bg-gray-400 rounded-full animate-bounce"></div>
                                    <div className="w-2 h-2 bg-gray-400 rounded-full animate-bounce delay-75"></div>
                                    <div className="w-2 h-2 bg-gray-400 rounded-full animate-bounce delay-150"></div>
                                </div>
                            </div>
                        )}
                        <div ref={messagesEndRef} />
                    </main>

                    {/* 하단 입력창 및 다중 첨부파일 칩 영역 */}
                    <footer className="bg-white px-3 py-2 sm:py-3 flex flex-col border-t border-gray-200 flex-shrink-0 pb-4 shadow-sm relative z-10">
                        {attachedFiles.length > 0 && (
                            <div className="mb-2 flex space-x-2 overflow-x-auto pb-2" style={{ scrollbarWidth: 'thin' }}>
                                {attachedFiles.map(f => (
                                    <div key={f.id} className="relative inline-block flex-shrink-0">
                                        <div className="flex items-center space-x-2 bg-gray-50 px-3 py-1.5 rounded-xl border border-gray-200 shadow-sm pr-9 max-w-[180px]">
                                            {f.isImage && f.previewUrl ? (
                                                <img src={f.previewUrl} alt="preview" className="w-8 h-8 object-cover rounded-lg shadow-sm border border-black/5" />
                                            ) : (
                                                <div className="w-8 h-8 bg-white rounded-lg flex items-center justify-center text-lg shadow-sm border border-black/5 flex-shrink-0">
                                                    {f.isPDF ? '📄' : '📝'}
                                                </div>
                                            )}
                                            <span className="text-xs text-gray-700 font-bold truncate flex-1">{f.name}</span>
                                            <button onClick={() => removeFile(f.id)} className="absolute top-1/2 -translate-y-1/2 right-1.5 p-1 bg-gray-200 hover:bg-red-500 hover:text-white transition-colors flex items-center justify-center rounded-full text-gray-600 text-[10px]">❌</button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                        
                        <div className="flex items-end space-x-2 w-full">
                            {/* 여러 파일 선택 가능하도록 multiple 속성 추가 */}
                            <input type="file" className="hidden" ref={fileInputRef} onChange={handleFileUpload} multiple />
                            <button onClick={() => fileInputRef.current?.click()} className="p-2.5 text-gray-500 bg-gray-50 hover:bg-gray-100 rounded-xl shadow-sm border border-gray-200 text-xl">
                                📎
                            </button>
                            <div className="flex-1 bg-gray-100 rounded-2xl flex items-end px-3 py-1.5 shadow-inner">
                                <textarea
                                    value={inputText}
                                    onChange={(e) => setInputText(e.target.value)}
                                    onKeyDown={(e) => {
                                        if (e.nativeEvent.isComposing) return;
                                        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSendMessage(); }
                                    }}
                                    placeholder="질문하기... (여기에 파일을 끌어다 놓으세요)"
                                    className="w-full bg-transparent border-none focus:outline-none resize-none max-h-24 py-2 text-[15px]"
                                    rows={1}
                                    style={{ minHeight: '40px', height: inputText ? 'auto' : '40px' }}
                                />
                            </div>
                            <button 
                                onClick={handleSendMessage}
                                disabled={(!inputText.trim() && attachedFiles.length === 0) || isLoading}
                                className={`p-2.5 rounded-xl shadow-sm text-xl ${(!inputText.trim() && attachedFiles.length === 0) || isLoading ? 'bg-gray-200 text-gray-400' : 'bg-[#fee500] text-yellow-900 active:scale-95'}`}
                            >
                                🚀
                            </button>
                        </div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
